<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Portal Transmisi | Manajemen Shift + Modul + Firebase + Tugas Harian</title>
    <link rel="icon" type="image/ico" href="favicon.ico">
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth-check.js"></script>
    <style>
        /* ========== RESPONSIVE ENHANCEMENTS ========== */
        /* Gunakan variabel CSS dan teknik modern agar lebih adaptif */
        :root {
            --border-radius-card: clamp(16px, 4vw, 32px);
            --padding-container: clamp(12px, 3vw, 24px);
            --gap-responsive: clamp(8px, 2vw, 16px);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #eef2f8; 
            padding: clamp(6px, 2vw, 12px); 
            min-height: 100vh; 
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; 
            line-height: 1.4; 
        }
        .app-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            background: white; 
            border-radius: clamp(28px, 5vw, 36px); 
            box-shadow: 0 20px 40px -14px rgba(0, 0, 0, 0.15); 
            overflow: hidden; 
        }
        /* Header lebih fleksibel dan tidak meluber */
        .header { 
            background: linear-gradient(135deg, #1e6f5c 0%, #0e5a48 100%); 
            color: white; 
            padding: clamp(14px, 3vw, 24px); 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            justify-content: space-between; 
            gap: var(--gap-responsive); 
        }
        .header-left { 
            display: flex; 
            align-items: center; 
            gap: clamp(8px, 2vw, 14px); 
            flex-wrap: wrap; 
            flex: 1 1 auto;
        }
        .header-logo { 
            height: clamp(50px, 8vw, 80px); 
            width: auto; 
            max-width: clamp(120px, 30vw, 260px); 
            object-fit: contain; 
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3)); 
        }
        .header h1 { 
            font-size: clamp(1.2rem, 5vw, 1.5rem); 
            font-weight: 700; 
            background: rgba(255,255,255,0.1); 
            padding: 4px 14px; 
            border-radius: 60px; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            white-space: normal; 
            word-break: keep-all;
            flex-wrap: wrap;
        }
        .sync-status { 
            font-size: clamp(0.6rem, 2vw, 0.7rem); 
            padding: 4px 12px; 
            border-radius: 40px; 
            background: rgba(0,0,0,0.2); 
            margin-left: 8px; 
            white-space: nowrap;
        }
        .month-picker { 
            background: rgba(255,255,255,0.2); 
            backdrop-filter: blur(4px); 
            padding: 6px 12px; 
            border-radius: 60px; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            flex-wrap: wrap; 
            justify-content: center;
        }
        .month-picker select { 
            background: white; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 40px; 
            font-weight: 600; 
            color: #0b2b40; 
            cursor: pointer;
            font-size: 0.85rem;
        }
        .badge-status { 
            background: #f5b042; 
            color: #1e3a4d; 
            padding: 6px 14px; 
            border-radius: 40px; 
            font-size: 0.75rem; 
            font-weight: bold;
            white-space: nowrap;
        }
        #userRoleDisplay {
            background: rgba(0,0,0,0.5);
            color: #fef9c3;
            font-weight: 600;
        }
        .btn-refresh, .btn-logout { 
            background: rgba(255,255,255,0.2); 
            border: none; 
            color: white; 
            padding: 6px 14px; 
            border-radius: 40px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            backdrop-filter: blur(4px); 
            transition: 0.2s;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        /* Shift navigation lebih responsif */
        .shift-navigation {
            background: #fef9e6;
            margin: clamp(12px, 3vw, 20px) clamp(12px, 4vw, 24px) 0 clamp(12px, 4vw, 24px);
            padding: clamp(16px, 3vw, 24px);
            border-radius: var(--border-radius-card);
            border-left: 8px solid #f5b042;
        }
        .shift-navigation h3 {
            color: #b45f1b;
            font-size: clamp(1.1rem, 4.5vw, 1.25rem);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .shift-date-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: white;
            padding: clamp(10px, 2vw, 18px);
            border-radius: 60px;
            justify-content: space-between;
        }
        .date-nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .date-nav-buttons button, .date-picker-wrapper button {
            background: #eef2f5;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .date-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 5px 15px;
            border-radius: 50px;
            flex-wrap: wrap;
        }
        .date-picker-wrapper input {
            border: 1px solid #cbd5e6;
            padding: 8px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            min-width: 140px;
        }
        .shift-detail-card {
            background: white;
            border-radius: 28px;
            padding: 18px 22px;
            margin-top: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .shift-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .shift-item {
            background: #f8fafc;
            padding: 10px 18px;
            border-radius: 48px;
            font-weight: 500;
            min-width: 160px;
            flex: 1 1 auto;
            border: 1px solid #e2edf2;
            font-size: 0.9rem;
        }
        .daily-tasks-card { 
            background: #ffffff; 
            margin: clamp(12px, 3vw, 20px) clamp(12px, 4vw, 24px) 0 clamp(12px, 4vw, 24px); 
            padding: clamp(16px, 3vw, 24px); 
            border-radius: var(--border-radius-card); 
            border: 1px solid #edf2f7; 
        }
        .daily-tasks-card h3 { 
            font-size: clamp(1rem, 4.5vw, 1.2rem); 
            font-weight: 600; 
            color: #1a4a3f; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        .daily-tasks-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            align-items: center; 
        }
        .task-badge { 
            background: #f8fafc; 
            border: 1px solid #e2edf2; 
            border-radius: 48px; 
            padding: 8px 20px; 
            font-size: 0.85rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            text-decoration: none; 
            color: #1e293b; 
            cursor: pointer; 
            transition: all 0.2s;
            flex: 0 1 auto;
        }
        .action-bar { 
            padding: 20px clamp(12px, 4vw, 24px) 8px clamp(12px, 4vw, 24px); 
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .btn-save, .btn-outline { 
            border: none; 
            padding: 10px 24px; 
            border-radius: 60px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            font-family: inherit;
            font-size: 0.9rem;
        }
        .btn-save { background: #1e6f5c; color: white; }
        .btn-save:hover { background: #0e5a48; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1.5px solid #cbd5e1; color: #2c3e4e; }
        .content-area { 
            padding: 8px clamp(12px, 4vw, 24px) 24px clamp(12px, 4vw, 24px); 
            border-top: 1px solid #eef2f5; 
            margin-top: 12px; 
            display: none; 
        }
        .shift-table-container { 
            overflow-x: auto; 
            border-radius: 24px; 
            border: 1px solid #e2e8f0; 
            margin: 16px 0;
            -webkit-overflow-scrolling: touch;
        }
        .shift-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: clamp(0.75rem, 2.5vw, 0.85rem); 
            min-width: 550px; 
        }
        .shift-table th { 
            background: #eef2f5; 
            padding: 12px 6px; 
            text-align: center; 
            border-bottom: 2px solid #cbd5e1; 
        }
        .shift-table td { 
            padding: 10px 6px; 
            text-align: center; 
            border-bottom: 1px solid #e9edf2; 
        }
        .shift-table input { 
            width: 100%; 
            min-width: 100px; 
            padding: 8px; 
            border-radius: 20px; 
            border: 1px solid #cbd5e6; 
            text-align: center; 
            font-size: 0.85rem;
        }
        .modules-section { 
            padding: 28px clamp(12px, 4vw, 24px) 36px clamp(12px, 4vw, 24px); 
            border-top: 2px solid #e9edf2; 
            margin-top: 12px; 
        }
        .modules-section h3 { 
            font-size: clamp(1.2rem, 5vw, 1.35rem); 
            font-weight: 700; 
            color: #0b2b40; 
            margin-bottom: 24px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            flex-wrap: wrap;
        }
        .modules-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: clamp(16px, 3vw, 24px); 
        }
        .module-card { 
            background: white; 
            border-radius: 28px; 
            padding: clamp(12px, 2vw, 20px); 
            border: 1px solid #e2edf2; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            text-decoration: none; 
            color: #1e293b; 
            transition: 0.2s;
        }
        .module-icon { 
            font-size: 1.8rem; 
            width: 54px; 
            height: 54px; 
            background: #eef2fa; 
            border-radius: 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #1e6f5c;
            flex-shrink: 0;
        }
        .module-info h4 { 
            font-size: 1rem; 
            font-weight: 800; 
        }
        .module-info p { 
            font-size: 0.7rem; 
            color: #5b6e8c; 
        }
        .warning-message, .info-message { 
            padding: 12px 18px; 
            border-radius: 28px; 
            margin: 16px 0; 
            font-size: 0.9rem;
        }
        .warning-message { background: #fff3e0; color: #b45f1b; border-left: 5px solid #f5b042; }
        .info-message { background: #e6f7f0; color: #1e6f5c; border-left: 5px solid #1e6f5c; }
        footer { 
            text-align: center; 
            padding: 20px; 
            font-size: 0.7rem; 
            color: #7f8c8d; 
            border-top: 1px solid #e2edf2; 
            background: #fafcff; 
        }

        /* ===== MEDIA QUERIES LEBIH HALUS ===== */
        @media (max-width: 780px) {
            body { padding: 6px; }
            .header { padding: 14px 16px; flex-direction: column; align-items: stretch; gap: 12px; }
            .header-left { justify-content: space-between; flex-wrap: wrap; }
            .header h1 { font-size: 1.2rem; white-space: normal; text-align: center; justify-content: center; }
            .month-picker { justify-content: space-between; width: 100%; flex-wrap: wrap; }
            .shift-navigation { margin: 12px 12px 0 12px; padding: 16px; }
            .shift-date-controls { flex-direction: column; align-items: stretch; border-radius: 32px; }
            .date-nav-buttons { justify-content: center; }
            .date-picker-wrapper { justify-content: center; flex-wrap: wrap; }
            .shift-detail { flex-direction: column; align-items: stretch; }
            .shift-item { text-align: center; }
            .action-bar { justify-content: center; }
        }
        @media (max-width: 580px) {
            .header-logo { height: 45px; max-width: 140px; }
            .daily-tasks-list { flex-direction: column; align-items: stretch; }
            .task-badge { justify-content: center; width: 100%; }
            .module-card { padding: 12px 16px; }
            .module-icon { width: 48px; height: 48px; font-size: 1.5rem; }
            .btn-save, .btn-outline { width: 100%; justify-content: center; }
            .shift-table th, .shift-table td { padding: 8px 4px; }
        }
        @media (max-width: 380px) {
            .month-picker select { padding: 4px 8px; font-size: 0.75rem; }
            .badge-status { font-size: 0.65rem; padding: 4px 8px; }
            .btn-refresh, .btn-logout { padding: 5px 12px; font-size: 0.7rem; }
            .shift-item { font-size: 0.8rem; }
        }
        button, .module-card, select, .task-badge { touch-action: manipulation; }
        /* Pastikan tidak ada overflow */
        img, iframe, video { max-width: 100%; height: auto; }
        .content-area .shift-table-container { overflow-x: auto; }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="header">
        <div class="header-left">
            <img src="Logo%20PortalTM-noBg.png" alt="Logo Portal Transmisi" class="header-logo" onerror="this.style.display='none'">
            <h1>Portal Transmisi
                <span id="firebaseStatus" class="sync-status"><i class="fas fa-cloud-upload-alt"></i> Menghubungkan...</span>
            </h1>
        </div>
        <div class="month-picker">
            <span>📆 Periode:</span>
            <select id="monthSelect" aria-label="Pilih bulan"></select>
            <select id="yearSelect" aria-label="Pilih tahun"></select>
            <span class="badge-status" id="statusBadge">✅ Siap</span>
        </div>
        <div class="header-actions">
            <span id="userRoleDisplay" class="badge-status"><i class="fas fa-user"></i> Memuat...</span>
            <a href="user-control.html" id="adminControlLink" style="display: none; background: #f5b042; color: #1e3a4d; padding: 6px 14px; border-radius: 40px; text-decoration: none; font-size: 0.75rem; font-weight: bold;"><i class="fas fa-shield-alt"></i> User Control</a>
            <button id="logoutBtn" class="btn-logout" style="display: none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            <button id="refreshPageBtn" class="btn-refresh" title="Refresh Halaman">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>
    </div>

    <div id="mainMenuPanel">
        <div class="main-menu-container">
            <!-- KARTU NAVIGASI SHIFT HARIAN (DENGAN TOMBOL NEXT/PREV & DATE PICKER) -->
            <div class="shift-navigation">
                <h3><i class="fas fa-calendar-alt"></i> Jadwal Shift</h3>
                <div class="shift-date-controls">
                    <div class="date-nav-buttons">
                        <button id="prevDayBtn" title="Hari Sebelumnya"><i class="fas fa-chevron-left"></i> Sebelumnya</button>
                        <button id="nextDayBtn" title="Hari Berikutnya">Berikutnya <i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="date-picker-wrapper">
                        <i class="fas fa-calendar-day"></i>
                        <input type="date" id="datePickerInput" style="border-radius: 40px; padding: 8px 12px; border: 1px solid #cbd5e6;">
                        <button id="goToDateBtn"><i class="fas fa-eye"></i> Tampilkan</button>
                    </div>
                </div>
                <div id="shiftDetailContainer" class="shift-detail-card">
                    <!-- Isi shift akan dirender di sini -->
                    <div class="info-message"><i class="fas fa-spinner fa-pulse"></i> Memuat jadwal...</div>
                </div>
            </div>

            <div class="daily-tasks-card" id="dailyTasksCard">
                <h3><i class="fas fa-tasks"></i> Tugas Monitoring Hari Ini</h3>
                <div id="dailyTasksList" class="daily-tasks-list">
                    <span class="task-badge empty-msg"><i class="fas fa-spinner fa-pulse"></i> Memuat tugas...</span>
                </div>
            </div>
            <div class="action-bar">
                <button id="btnManageShift" class="btn-save"><i class="fas fa-users"></i> Kelola Jadwal Shift (Edit / Perbarui)</button>
            </div>
            <div id="dynamicContent" class="content-area" style="display: none;"></div>
            <div class="modules-section">
                <h3><i class="fas fa-microchip"></i> Modul Monitoring Lainnya</h3>
                <div class="modules-grid" id="modulesGrid"></div>
            </div>
        </div>
        <footer><i class="fas fa-clock"></i> Sistem Manajemen Shift & Monitoring Terpadu | Portal Transmisi - Tanah Merah (Firebase Offline Ready)</footer>
    </div>
</div>

<script>
    // ========== PROTEKSI REDIRECT LOOP ==========
    (function() {
        let redirectCount = sessionStorage.getItem('auth_redirect_count');
        if (redirectCount) {
            let count = parseInt(redirectCount);
            if (count >= 2) {
                sessionStorage.removeItem('auth_redirect_count');
                localStorage.setItem('guestMode', 'true');
                console.warn("Redirect loop detected, falling back to guest mode");
                return;
            } else {
                sessionStorage.setItem('auth_redirect_count', count + 1);
            }
        } else {
            sessionStorage.setItem('auth_redirect_count', '1');
        }
    })();

    function checkAuthAndRedirect() {
        if (localStorage.getItem('guestMode') === 'true') {
            sessionStorage.removeItem('auth_redirect_count');
            return true;
        }
        if (!window.auth) {
            console.log("Firebase Auth belum siap, menunda pengecekan");
            return true;
        }
        if (window.auth.currentUser) {
            sessionStorage.removeItem('auth_redirect_count');
            return true;
        }
        window.location.href = 'login.html';
        return false;
    }
    if (!checkAuthAndRedirect()) throw new Error("Redirecting");
    sessionStorage.removeItem('auth_redirect_count');

    // ========== KONFIGURASI FIREBASE & GLOBAL ==========
    let isFirebaseReady = false;
    let currentShiftListenerRef = null;     
    let currentShiftData = {};               
    let isManagePanelOpen = false;            
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;
    let selectedDateObj = new Date(); // default hari ini (sesuai zona lokal)
    
    const DB_PATH_SHIFT = 'monitoring/shift';   

    function updateFirebaseStatus(connected, message) {
        const statusEl = document.getElementById('firebaseStatus');
        if (statusEl) {
            if (connected) statusEl.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            else statusEl.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
        }
    }

    async function syncShiftToFirebase(year, month, scheduleObj) {
        if (!isFirebaseReady || !window.db) return false;
        try {
            const path = `${DB_PATH_SHIFT}/${year}/${String(month).padStart(2,'0')}`;
            await window.db.ref(path).set(scheduleObj);
            updateFirebaseStatus(true, "Tersinkron");
            return true;
        } catch (err) {
            console.error("Gagal sync shift:", err);
            updateFirebaseStatus(false, "Gagal sync");
            return false;
        }
    }

    function getShiftPath(year, month) {
        return `${DB_PATH_SHIFT}/${year}/${String(month).padStart(2,'0')}`;
    }

    function detachShiftListener() {
        if (currentShiftListenerRef) {
            currentShiftListenerRef.off('value');
            currentShiftListenerRef = null;
        }
    }

    function onShiftDataChanged(snapshot) {
        const data = snapshot.val();
        currentShiftData = (data && typeof data === 'object') ? data : {};
        refreshShiftForSelectedDate();  // update tampilan dengan tanggal yg dipilih
        if (isManagePanelOpen) {
            const dynamicDiv = document.getElementById('dynamicContent');
            if (dynamicDiv && dynamicDiv.style.display === 'block') renderManageShiftPanel(dynamicDiv);
        }
    }

    function attachShiftListener(year, month) {
        if (!isFirebaseReady || !window.db) return;
        detachShiftListener();
        const ref = window.db.ref(getShiftPath(year, month));
        currentShiftListenerRef = ref;
        ref.on('value', onShiftDataChanged, (error) => updateFirebaseStatus(false, "Error listener"));
        ref.once('value').then(onShiftDataChanged).catch(err => console.warn(err));
    }

    function getDaysInMonth(year, month) {
        return new Date(year, month, 0).getDate();
    }

    function formatDateStr(year, month, day) {
        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function getDayName(year, month, day) {
        const date = new Date(year, month - 1, day);
        return ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'][date.getDay()];
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- FITUR NAVIGASI SHIFT HARIAN BARU ----------
    function updateSelectedDateFromPickers() {
        const datePicker = document.getElementById('datePickerInput');
        if (datePicker && datePicker.value) {
            const parts = datePicker.value.split('-');
            if (parts.length === 3) {
                const newYear = parseInt(parts[0]);
                const newMonth = parseInt(parts[1]);
                const newDay = parseInt(parts[2]);
                if (!isNaN(newYear) && !isNaN(newMonth) && !isNaN(newDay)) {
                    if (newYear !== currentYear || newMonth !== currentMonth) {
                        // Ganti bulan/tahun terlebih dahulu
                        currentYear = newYear;
                        currentMonth = newMonth;
                        // Sinkronkan dropdown bulan/tahun
                        document.getElementById('yearSelect').value = currentYear;
                        document.getElementById('monthSelect').value = currentMonth;
                        attachShiftListener(currentYear, currentMonth);
                    }
                    selectedDateObj = new Date(newYear, newMonth - 1, newDay);
                    refreshShiftForSelectedDate();
                }
            }
        }
    }

    function goToPrevDay() {
        const newDate = new Date(selectedDateObj);
        newDate.setDate(selectedDateObj.getDate() - 1);
        applyNewDate(newDate);
    }

    function goToNextDay() {
        const newDate = new Date(selectedDateObj);
        newDate.setDate(selectedDateObj.getDate() + 1);
        applyNewDate(newDate);
    }

    function applyNewDate(date) {
        const targetYear = date.getFullYear();
        const targetMonth = date.getMonth() + 1;
        const targetDay = date.getDate();
        let needReload = (targetYear !== currentYear || targetMonth !== currentMonth);
        if (needReload) {
            currentYear = targetYear;
            currentMonth = targetMonth;
            document.getElementById('yearSelect').value = currentYear;
            document.getElementById('monthSelect').value = currentMonth;
            attachShiftListener(currentYear, currentMonth);
        }
        selectedDateObj = new Date(targetYear, targetMonth - 1, targetDay);
        // update input date picker
        const datePicker = document.getElementById('datePickerInput');
        if (datePicker) {
            let yyyy = selectedDateObj.getFullYear();
            let mm = String(selectedDateObj.getMonth() + 1).padStart(2, '0');
            let dd = String(selectedDateObj.getDate()).padStart(2, '0');
            datePicker.value = `${yyyy}-${mm}-${dd}`;
        }
        refreshShiftForSelectedDate();
    }

    function refreshShiftForSelectedDate() {
        const container = document.getElementById('shiftDetailContainer');
        if (!container) return;
        const year = selectedDateObj.getFullYear();
        const month = selectedDateObj.getMonth() + 1;
        const day = selectedDateObj.getDate();
        const dateKey = formatDateStr(year, month, day);
        const dayName = getDayName(year, month, day);
        
        // Cek apakah data untuk bulan yang aktif tersedia (currentShiftData milik currentYear/currentMonth)
        // Jika bulan yang dipilih berbeda dengan currentMonth (karena navigasi cepat), pastikan data yang benar.
        if (year !== currentYear || month !== currentMonth) {
            container.innerHTML = `<div class="warning-message"><i class="fas fa-sync-alt"></i> Mengganti periode ke ${year}-${String(month).padStart(2,'0')} ...</div>`;
            // sinkronkan global dan reload listener
            currentYear = year;
            currentMonth = month;
            document.getElementById('yearSelect').value = currentYear;
            document.getElementById('monthSelect').value = currentMonth;
            attachShiftListener(currentYear, currentMonth);
            // setelah listener terpasang, akan memanggil refreshShiftForSelectedDate lagi via onShiftDataChanged, jadi return dulu
            return;
        }
        
        // Sekarang currentShiftData sudah sesuai dengan tahun/bulan yang dipilih
        if (!currentShiftData || Object.keys(currentShiftData).length === 0) {
            container.innerHTML = `<div class="warning-message"><i class="fas fa-exclamation-triangle"></i> ⚠️ Belum ada jadwal shift untuk periode ${currentYear}-${String(currentMonth).padStart(2,'0')}. Silakan isi melalui tombol "Kelola Jadwal Shift".</div>`;
            return;
        }
        const shiftData = currentShiftData[dateKey];
        if (!shiftData) {
            container.innerHTML = `<div class="warning-message"><i class="fas fa-calendar-times"></i> ⚠️ Data shift untuk tanggal ${dateKey} (${dayName}) tidak ditemukan. Harap lengkapi jadwal melalui "Kelola Jadwal Shift".</div>`;
            return;
        }
        container.innerHTML = `
            <div class="shift-detail">
                <div class="shift-item"><i class="fas fa-calendar-check"></i> 📅 ${dateKey} (${dayName})</div>
                <div class="shift-item"><i class="fas fa-moon"></i> Shift 1 (00:00 - 08:00) : <strong>${escapeHtml(shiftData.shift1 || '-')}</strong></div>
                <div class="shift-item"><i class="fas fa-sun"></i> Shift 2 (08:00 - 16:00) : <strong>${escapeHtml(shiftData.shift2 || '-')}</strong></div>
                <div class="shift-item"><i class="fas fa-cloud-moon"></i> Shift 3 (16:00 - 00:00) : <strong>${escapeHtml(shiftData.shift3 || '-')}</strong></div>
            </div>
        `;
    }

    function closeManagePanel() {
        const dynamicDiv = document.getElementById('dynamicContent');
        if (dynamicDiv) {
            dynamicDiv.style.display = 'none';
            dynamicDiv.innerHTML = '';
        }
        isManagePanelOpen = false;
    }

    async function renderManageShiftPanel(containerElement) {
        if (!containerElement) return;
        const daysCount = getDaysInMonth(currentYear, currentMonth);
        const existing = currentShiftData || {};
        let html = `<div style="margin-bottom:20px;"><div style="display: flex; justify-content: space-between; flex-wrap: wrap;"><h3><i class="fas fa-calendar-edit"></i> Edit Jadwal Shift - ${currentYear}/${String(currentMonth).padStart(2,'0')}</h3><button id="closeManagePanel" class="btn-outline"><i class="fas fa-times"></i> Tutup</button></div><div class="info-message"><i class="fas fa-info-circle"></i> Isi nama petugas untuk setiap shift. Perubahan langsung tersimpan.</div></div>
        <div class="shift-table-container"><table class="shift-table"><thead><tr><th>Tanggal</th><th>Hari</th><th>Shift 1 (00-08)</th><th>Shift 2 (08-16)</th><th>Shift 3 (16-00)</th></tr></thead><tbody>`;
        for (let d = 1; d <= daysCount; d++) {
            const dateKey = formatDateStr(currentYear, currentMonth, d);
            const shift = existing[dateKey] || { shift1: '', shift2: '', shift3: '' };
            const dayName = getDayName(currentYear, currentMonth, d);
            html += `<tr><td><strong>${dateKey}</strong></td><td>${dayName}</td><td><input type="text" class="manage-shift-inp" data-date="${dateKey}" data-shift="shift1" value="${escapeHtml(shift.shift1)}" placeholder="Petugas"></td>
            <td><input type="text" class="manage-shift-inp" data-date="${dateKey}" data-shift="shift2" value="${escapeHtml(shift.shift2)}" placeholder="Petugas"></td>
            <td><input type="text" class="manage-shift-inp" data-date="${dateKey}" data-shift="shift3" value="${escapeHtml(shift.shift3)}" placeholder="Petugas"></td></tr>`;
        }
        html += `</tbody></table></div><div style="display:flex; gap:16px; margin-top:24px; flex-wrap:wrap;"><button id="btnUpdateSchedule" class="btn-save"><i class="fas fa-save"></i> Simpan Perubahan</button><button id="btnCancelManage" class="btn-outline"><i class="fas fa-arrow-left"></i> Batal</button></div>`;
        containerElement.innerHTML = html;
        document.getElementById('btnUpdateSchedule')?.addEventListener('click', async () => {
            const newData = {};
            let hasEmpty = false;
            document.querySelectorAll('.manage-shift-inp').forEach(inp => {
                const date = inp.dataset.date;
                const shiftType = inp.dataset.shift;
                if (!newData[date]) newData[date] = { shift1: '', shift2: '', shift3: '' };
                newData[date][shiftType] = inp.value.trim();
            });
            for (let d = 1; d <= daysCount; d++) {
                const dateKey = formatDateStr(currentYear, currentMonth, d);
                const dayShift = newData[dateKey];
                if (dayShift && (!dayShift.shift1 || !dayShift.shift2 || !dayShift.shift3)) hasEmpty = true;
            }
            if (hasEmpty && !confirm("⚠️ Ada shift kosong. Lanjutkan?")) return;
            if (await syncShiftToFirebase(currentYear, currentMonth, newData)) {
                alert("✅ Jadwal shift tersimpan.");
                refreshShiftForSelectedDate();
                closeManagePanel();
            } else alert("❌ Gagal menyimpan.");
        });
        document.getElementById('btnCancelManage')?.addEventListener('click', () => closeManagePanel());
        document.getElementById('closeManagePanel')?.addEventListener('click', () => closeManagePanel());
    }
    
    async function showManagePanel() {
        const dynamicDiv = document.getElementById('dynamicContent');
        if (dynamicDiv) {
            dynamicDiv.style.display = 'block';
            isManagePanelOpen = true;
            await renderManageShiftPanel(dynamicDiv);
            dynamicDiv.scrollIntoView({ behavior: 'smooth' });
        }
    }
    
    // TUGAS HARIAN
    function getDailyNotifications() {
        const today = new Date();
        const dayOfWeek = today.getDay();
        const currentDate = today.getDate();
        const tasks = [
            { text: "Monitoring Suhu", link: "Monitoring Suhu.html", icon: "fa-temperature-high" },
            { text: "Monitoring Metering", link: "Monitoring Metering.html", icon: "fa-chart-line" },
            { text: "Monitoring Siaran Papua", link: "Monitoring Siaran.html", icon: "fa-satellite-dish" },
            { text: "Monitoring Dashboard TVRI", link: "https://tvri.lodagency.co.id/", icon: "fa-tv" }
        ];
        if (dayOfWeek === 1) tasks.push({ text: "Monitoring Kebersihan", link: "Monitoring Kebersihan.html", icon: "fa-broom" });
        if (dayOfWeek === 6) tasks.push({ text: "Pemanasan Genset", link: "Monitoring BBM.html", icon: "fa-gas-pump" });
        if (currentDate === 13) tasks.push({ text: "Monitoring Grounding", link: "Monitoring Grounding.html", icon: "fa-bolt" });
        if (currentDate === 23) tasks.push({ text: "Monitoring Kwh Meter", link: "Monitoring Kwh Meter.html", icon: "fa-charging-station" });
        return tasks;
    }
    
    function renderDailyNotifications() {
        const container = document.getElementById('dailyTasksList');
        if (!container) return;
        const tasks = getDailyNotifications();
        if (!tasks.length) { container.innerHTML = `<span class="task-badge"><i class="fas fa-check-circle"></i> Tidak ada tugas tambahan hari ini</span>`; return; }
        container.innerHTML = tasks.map(task => `<a href="${task.link}" ${task.link.startsWith('http') ? 'target="_blank" rel="noopener"' : 'target="_self"' } class="task-badge"><i class="fas ${task.icon}"></i> ${escapeHtml(task.text)}</a>`).join('');
    }
    
    const modulesList = [
        { name: "Monitoring Suhu", icon: "fas fa-temperature-high", file: "Monitoring Suhu.html", desc: "Suhu ruangan & watermark GPS" },
        { name: "Monitoring Pemancar", icon: "fas fa-broadcast-tower", file: "Monitoring Pemancar.html", desc: "Catat downtime ON/OFF" },
        { name: "Monitoring Kwh Meter", icon: "fas fa-charging-station", file: "Monitoring Kwh Meter.html", desc: "Pencatatan listrik & foto" },
        { name: "Monitoring Metering", icon: "fas fa-chart-line", file: "Monitoring Metering.html", desc: "PLN & UPS + spreadsheet" },
        { name: "Monitoring Siaran", icon: "fas fa-satellite-dish", file: "Monitoring Siaran.html", desc: "Status channel & laporan" },
        { name: "Monitoring Kerusakan", icon: "fas fa-tools", file: "Monitoring Kerusakan.html", desc: "Multi foto & status alat" },
        { name: "Monitoring BBM", icon: "fas fa-gas-pump", file: "Monitoring BBM.html", desc: "Genset & konsumsi BBM" },
        { name: "Monitoring Multiplexing", icon: "fas fa-network-wired", file: "Monitoring Multiplexing.html", desc: "Pantau 3 IRD, MUX, Kabel & IP" },
        { name: "Monitoring Kebersihan", icon: "fas fa-broom", file: "Monitoring Kebersihan.html", desc: "Pantau kebersihan area" },
        { name: "Monitoring Grounding", icon: "fas fa-bolt", file: "Monitoring Grounding.html", desc: "Pencatatan grounding 3 titik" },
        { name: "Monitoring Dashboard TVRI", icon: "fas fa-tv", file: "https://tvri.lodagency.co.id/", desc: "Akses dashboard TVRI" }
    ];
    
    function renderModulesGrid() {
        const grid = document.getElementById('modulesGrid');
        if (grid) grid.innerHTML = modulesList.map(mod => `<a href="${mod.file}" ${mod.file.startsWith('http') ? 'target="_blank"' : 'target="_self"'} class="module-card"><div class="module-icon"><i class="${mod.icon}"></i></div><div class="module-info"><h4>${mod.name}</h4><p>${mod.desc}</p></div></a>`).join('');
    }
    
    window.addEventListener('roleChanged', (e) => {
        const role = e.detail.role;
        document.getElementById('btnManageShift').style.display = (role === 'guest') ? 'none' : 'inline-flex';
        document.getElementById('adminControlLink').style.display = (role === 'admin') ? 'inline-flex' : 'none';
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.style.display = 'inline-flex';
            logoutBtn.innerHTML = (role === 'guest') ? '<i class="fas fa-sign-in-alt"></i> Login' : '<i class="fas fa-sign-out-alt"></i> Logout';
        }
        const roleSpan = document.getElementById('userRoleDisplay');
        if (roleSpan) roleSpan.innerHTML = (role === 'admin') ? '<i class="fas fa-user-shield"></i> Admin' : (role === 'user' ? '<i class="fas fa-user"></i> User' : '<i class="fas fa-user-friends"></i> Tamu');
    });

    async function handleLogoutOrLogin() {
        const role = window.currentRole || localStorage.getItem('userRole') || 'guest';
        if (role === 'guest') { localStorage.removeItem('guestMode'); window.location.href = 'login.html'; }
        else { if (typeof window.logoutUser === 'function') await window.logoutUser(); else await window.auth.signOut(); localStorage.removeItem('guestMode'); window.location.href = 'login.html'; }
    }
    
    function populateMonthYearSelectors() {
        const monthSelect = document.getElementById('monthSelect'), yearSelect = document.getElementById('yearSelect');
        for (let i = 1; i <= 12; i++) { let opt = document.createElement('option'); opt.value = i; opt.textContent = new Date(2000, i-1, 1).toLocaleString('id', { month: 'long' }); if (i === currentMonth) opt.selected = true; monthSelect.appendChild(opt); }
        const nowYear = new Date().getFullYear();
        for (let y = nowYear - 1; y <= nowYear + 3; y++) { let opt = document.createElement('option'); opt.value = y; opt.textContent = y; if (y === currentYear) opt.selected = true; yearSelect.appendChild(opt); }
        monthSelect.addEventListener('change', async (e) => { currentMonth = parseInt(e.target.value); await reloadBySelection(); });
        yearSelect.addEventListener('change', async (e) => { currentYear = parseInt(e.target.value); await reloadBySelection(); });
    }
    
    async function reloadBySelection() {
        closeManagePanel();
        attachShiftListener(currentYear, currentMonth);
        document.getElementById('statusBadge').innerText = `📅 ${currentYear}-${String(currentMonth).padStart(2, '0')}`;
        // Set selectedDate ke tanggal 1 bulan yg baru
        selectedDateObj = new Date(currentYear, currentMonth - 1, 1);
        const picker = document.getElementById('datePickerInput');
        if (picker) picker.value = `${currentYear}-${String(currentMonth).padStart(2,'0')}-01`;
        refreshShiftForSelectedDate();
    }
    
    async function enableFirebasePersistence() {
        if (window.db && typeof window.db.enablePersistence === 'function') {
            try { await window.db.enablePersistence(); console.log("Persistence aktif"); } catch(e) { console.log(e.message); }
        }
    }
    
    function waitForFirebaseAndLoad() {
        if (window.db) {
            isFirebaseReady = true;
            enableFirebasePersistence().then(() => updateFirebaseStatus(true, "Offline Ready")).catch(() => updateFirebaseStatus(true, "Terhubung"));
            initMainMenu();
        } else setTimeout(waitForFirebaseAndLoad, 300);
    }
    
    async function initMainMenu() {
        attachShiftListener(currentYear, currentMonth);
        renderModulesGrid();
        renderDailyNotifications();
        document.getElementById('btnManageShift')?.addEventListener('click', () => showManagePanel());
        document.getElementById('logoutBtn')?.addEventListener('click', handleLogoutOrLogin);
        document.getElementById('prevDayBtn')?.addEventListener('click', goToPrevDay);
        document.getElementById('nextDayBtn')?.addEventListener('click', goToNextDay);
        document.getElementById('goToDateBtn')?.addEventListener('click', () => updateSelectedDateFromPickers());
        const datePicker = document.getElementById('datePickerInput');
        if (datePicker) {
            let today = new Date();
            let yyyy = today.getFullYear(), mm = String(today.getMonth()+1).padStart(2,'0'), dd = String(today.getDate()).padStart(2,'0');
            datePicker.value = `${yyyy}-${mm}-${dd}`;
            selectedDateObj = new Date(yyyy, today.getMonth(), today.getDate());
        }
        refreshShiftForSelectedDate();
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        populateMonthYearSelectors();
        document.getElementById('statusBadge').innerText = `📅 ${currentYear}-${String(currentMonth).padStart(2, '0')}`;
        waitForFirebaseAndLoad();
        document.getElementById('refreshPageBtn')?.addEventListener('click', () => location.reload());
    });
</script>
