<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Portal Transmisi | Manajemen Shift + Modul + Firebase (Offline Ready)</title>
    <link rel="icon" type="image/ico" href="favicon.ico">
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f8;
            padding: 12px;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.4;
        }

        /* Container utama */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 40px -14px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* ========= HEADER YANG LEBIH RAPI ========= */
        .header {
            background: linear-gradient(135deg, #1e6f5c 0%, #0e5a48 100%);
            color: white;
            padding: 18px 24px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .header-logo {
            height: 80px;
            width: auto;
            max-width: 260px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
            transition: all 0.2s;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.3px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 14px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .sync-status {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.2);
            font-weight: normal;
            margin-left: 8px;
        }

        /* Kontrol bulan & tahun */
        .month-picker {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            font-size: 0.85rem;
        }

        .month-picker select {
            background: white;
            border: none;
            padding: 8px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #0b2b40;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            transition: 0.2s;
        }

        .month-picker select:focus {
            outline: 2px solid #f5b042;
        }

        .badge-status {
            background: #f5b042;
            color: #1e3a4d;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
            white-space: nowrap;
        }

        /* ========= CARD SHIFT HARI INI ========= */
        .shift-today-card {
            background: #fef9e6;
            margin: 20px 24px 0 24px;
            padding: 20px 24px;
            border-radius: 32px;
            border-left: 8px solid #f5b042;
            box-shadow: 0 8px 18px -10px rgba(0, 0, 0, 0.08);
        }

        .shift-today-card h3 {
            color: #b45f1b;
            font-size: 1.25rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .shift-detail {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .shift-item {
            background: white;
            padding: 10px 18px;
            border-radius: 48px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            font-weight: 500;
            font-size: 0.9rem;
            word-break: break-word;
            flex: 1 0 auto;
            min-width: 180px;
        }

        /* Tombol aksi */
        .action-bar {
            padding: 20px 24px 8px 24px;
        }

        .btn-save, .btn-outline {
            border: none;
            padding: 12px 28px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            touch-action: manipulation;
            font-family: inherit;
        }

        .btn-save {
            background: #1e6f5c;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-save:hover {
            background: #0e5a48;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -8px rgba(0,0,0,0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #cbd5e1;
            color: #2c3e4e;
        }

        .btn-outline:hover {
            background: #eef2ff;
            border-color: #1e6f5c;
        }

        /* Konten dinamis (panel edit) */
        .content-area {
            padding: 8px 24px 24px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f5;
            margin-top: 12px;
        }

        /* Tabel shift */
        .shift-table-container {
            overflow-x: auto;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            background: #fff;
            margin: 16px 0;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }

        .shift-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 600px;
        }

        .shift-table th {
            background: #eef2f5;
            padding: 14px 8px;
            text-align: center;
            font-weight: 700;
            color: #1e3a4d;
            border-bottom: 2px solid #cbd5e1;
        }

        .shift-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #e9edf2;
            vertical-align: middle;
        }

        .shift-table input {
            width: 100%;
            min-width: 120px;
            padding: 10px 10px;
            border-radius: 20px;
            border: 1px solid #cbd5e6;
            background: #fefefe;
            font-size: 0.85rem;
            text-align: center;
            transition: 0.2s;
            font-family: inherit;
        }

        .shift-table input:focus {
            border-color: #f5b042;
            outline: none;
            box-shadow: 0 0 0 3px rgba(245, 176, 66, 0.2);
        }

        /* Bagian modul - grid lebih rapi */
        .modules-section {
            padding: 28px 24px 36px 24px;
            background: #fbfdff;
            border-top: 2px solid #e9edf2;
            margin-top: 12px;
        }

        .modules-section h3 {
            font-size: 1.35rem;
            font-weight: 700;
            color: #0b2b40;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .module-card {
            background: white;
            border-radius: 28px;
            padding: 16px 20px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2edf2;
            transition: all 0.25s;
            text-decoration: none;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 18px;
            touch-action: manipulation;
        }

        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 28px -12px rgba(0, 0, 0, 0.16);
            border-color: #f5b042;
            background: #ffffff;
        }

        .module-icon {
            font-size: 2rem;
            width: 58px;
            height: 58px;
            background: #eef2fa;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e6f5c;
        }

        .module-info h4 {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .module-info p {
            font-size: 0.7rem;
            color: #5b6e8c;
        }

        /* Pesan info / warning */
        .warning-message, .info-message {
            padding: 14px 20px;
            border-radius: 28px;
            font-size: 0.85rem;
            margin: 16px 0;
        }

        .warning-message {
            background: #fff3e0;
            color: #b45f1b;
            border-left: 5px solid #f5b042;
        }

        .info-message {
            background: #e6f7f0;
            color: #1e6f5c;
            border-left: 5px solid #1e6f5c;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            color: #7f8c8d;
            border-top: 1px solid #e2edf2;
            background: #fafcff;
        }

        /* ========= RESPONSIVE TINGKAT LANJUT ========= */
        @media (max-width: 780px) {
            body { padding: 8px; }
            .header { padding: 16px 18px; flex-direction: column; align-items: stretch; }
            .header-left { justify-content: space-between; flex-wrap: wrap; }
            .header h1 { font-size: 1.2rem; white-space: normal; word-break: keep-all; }
            .month-picker { justify-content: space-between; width: 100%; }
            .shift-today-card { margin: 16px 16px 0 16px; padding: 16px; }
            .shift-item { min-width: 140px; font-size: 0.8rem; }
            .action-bar { padding: 16px 16px 0 16px; }
            .content-area { padding: 8px 16px 20px 16px; }
            .modules-section { padding: 24px 16px 28px 16px; }
            .modules-grid { gap: 14px; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); }
            .btn-save, .btn-outline { padding: 10px 22px; font-size: 0.85rem; }
        }

        @media (max-width: 580px) {
            .header-logo { height: 60px; max-width: 180px; }
            .shift-detail { flex-direction: column; align-items: stretch; gap: 10px; }
            .shift-item { text-align: center; }
            .shift-table { min-width: 520px; }
            .shift-table input { min-width: 100px; font-size: 0.75rem; padding: 8px 4px; }
            .module-card { padding: 12px 14px; gap: 12px; }
            .module-icon { width: 48px; height: 48px; font-size: 1.6rem; }
            .module-info h4 { font-size: 0.85rem; }
            .badge-status { font-size: 0.7rem; padding: 4px 10px; }
            .month-picker select { padding: 6px 10px; font-size: 0.75rem; }
        }

        @media (max-width: 420px) {
            .header h1 { font-size: 1rem; gap: 5px; }
            .sync-status { font-size: 0.6rem; margin-left: 5px; }
            .modules-grid { grid-template-columns: 1fr; }
            .btn-save, .btn-outline { width: 100%; justify-content: center; }
            .action-bar { display: flex; flex-direction: column; gap: 10px; }
        }

        /* sentuhan aksesibilitas */
        button, .module-card, select {
            touch-action: manipulation;
        }

        button:focus-visible, .module-card:focus-visible, select:focus-visible {
            outline: 3px solid #f5b042;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="header">
        <div class="header-left">
            <img src="Logo%20PortalTM-noBg.png" alt="Logo Portal Transmisi" class="header-logo" onerror="this.style.display='none'">
            <h1>Portal Transmisi
                <span id="firebaseStatus" class="sync-status"><i class="fas fa-cloud-upload-alt"></i> Menghubungkan...</span>
            </h1>
        </div>
        <div class="month-picker">
            <span>📆 Periode:</span>
            <select id="monthSelect" aria-label="Pilih bulan"></select>
            <select id="yearSelect" aria-label="Pilih tahun"></select>
            <span class="badge-status" id="statusBadge">✅ Siap</span>
        </div>
    </div>

    <div id="mainMenuPanel">
        <div class="main-menu-container">
            <div class="shift-today-card">
                <h3><i class="fas fa-calendar-alt"></i> Jadwal Shift Hari Ini</h3>
                <div id="shiftDetailContainer">Memuat data shift...</div>
            </div>

            <div class="action-bar">
                <button id="btnManageShift" class="btn-save"><i class="fas fa-users"></i> Kelola Jadwal Shift (Edit / Perbarui)</button>
            </div>

            <div id="dynamicContent" class="content-area" style="display: none;"></div>

            <div class="modules-section">
                <h3><i class="fas fa-microchip"></i> Modul Monitoring Lainnya</h3>
                <div class="modules-grid" id="modulesGrid"></div>
            </div>
        </div>
        <footer><i class="fas fa-clock"></i> Sistem Manajemen Shift & Monitoring Terpadu | Portal Transmisi - Tanah Merah (Firebase Offline Ready)</footer>
    </div>
</div>

<script>
    // ========== KONFIGURASI FIREBASE DENGAN PERSISTENCE OFFLINE ==========
    let isFirebaseReady = false;
    let currentShiftListenerRef = null;     
    let currentShiftData = {};               
    let isManagePanelOpen = false;            
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth() + 1;

    const DB_PATH_SHIFT = 'monitoring/shift';   

    function updateFirebaseStatus(connected, message) {
        const statusEl = document.getElementById('firebaseStatus');
        if (statusEl) {
            if (connected) {
                statusEl.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
                statusEl.style.background = "rgba(0,0,0,0.2)";
            } else {
                statusEl.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
                statusEl.style.background = "rgba(220,50,50,0.5)";
            }
        }
    }

    async function syncShiftToFirebase(year, month, scheduleObj) {
        if (!isFirebaseReady || !window.db) {
            console.warn("Firebase belum siap, data tidak tersimpan.");
            return false;
        }
        try {
            const path = `${DB_PATH_SHIFT}/${year}/${String(month).padStart(2,'0')}`;
            await window.db.ref(path).set(scheduleObj);
            updateFirebaseStatus(true, "Tersinkron");
            return true;
        } catch (err) {
            console.error("Gagal sync shift ke Firebase:", err);
            updateFirebaseStatus(false, "Gagal sync");
            return false;
        }
    }

    function getShiftPath(year, month) {
        return `${DB_PATH_SHIFT}/${year}/${String(month).padStart(2,'0')}`;
    }

    function detachShiftListener() {
        if (currentShiftListenerRef) {
            currentShiftListenerRef.off('value');
            currentShiftListenerRef = null;
        }
    }

    function onShiftDataChanged(snapshot) {
        const data = snapshot.val();
        if (data && typeof data === 'object') {
            currentShiftData = data;
        } else {
            currentShiftData = {};
        }
        refreshShiftTodayDisplay();
        if (isManagePanelOpen) {
            const dynamicDiv = document.getElementById('dynamicContent');
            if (dynamicDiv && dynamicDiv.style.display === 'block') {
                renderManageShiftPanel(dynamicDiv);
            }
        }
    }

    function attachShiftListener(year, month) {
        if (!isFirebaseReady || !window.db) {
            console.warn("Firebase belum siap, tidak bisa pasang listener");
            return;
        }
        detachShiftListener();
        const path = getShiftPath(year, month);
        const ref = window.db.ref(path);
        currentShiftListenerRef = ref;
        ref.on('value', (snapshot) => {
            onShiftDataChanged(snapshot);
        }, (error) => {
            console.error("Listener error:", error);
            updateFirebaseStatus(false, "Error listener");
        });
        ref.once('value').then(snapshot => {
            onShiftDataChanged(snapshot);
        }).catch(err => console.warn("once value error", err));
    }

    function getDaysInMonth(year, month) {
        return new Date(year, month, 0).getDate();
    }

    function formatDateStr(year, month, day) {
        return `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    }

    function getDayName(year, month, day) {
        const date = new Date(year, month - 1, day);
        const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
        return days[date.getDay()];
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function (m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getTodayMappedInSelectedMonth() {
        const today = new Date();
        const currentDay = today.getDate();
        const daysInSelected = getDaysInMonth(currentYear, currentMonth);
        let mappedDay = currentDay;
        if (mappedDay > daysInSelected) mappedDay = daysInSelected;
        return formatDateStr(currentYear, currentMonth, mappedDay);
    }

    async function refreshShiftTodayDisplay() {
        const container = document.getElementById('shiftDetailContainer');
        if (!container) return;
        if (!currentShiftData || Object.keys(currentShiftData).length === 0) {
            container.innerHTML = `<div class="warning-message"><i class="fas fa-exclamation-triangle"></i> ⚠️ Belum ada jadwal shift untuk periode ${currentYear}-${String(currentMonth).padStart(2, '0')}. Silakan isi melalui tombol "Kelola Jadwal Shift".</div>`;
            return;
        }
        const targetDateKey = getTodayMappedInSelectedMonth();
        const shiftData = currentShiftData[targetDateKey];
        if (!shiftData) {
            container.innerHTML = `<div class="warning-message"><i class="fas fa-calendar-times"></i> ⚠️ Data shift untuk tanggal ${targetDateKey} tidak ditemukan. Harap lengkapi jadwal melalui "Kelola Jadwal Shift".</div>`;
            return;
        }
        const dayName = getDayName(currentYear, currentMonth, parseInt(targetDateKey.split('-')[2]));
        container.innerHTML = `
            <div class="shift-detail">
                <div class="shift-item">📆 ${targetDateKey} (${dayName})</div>
                <div class="shift-item">🕛 Shift 1 (00:00 - 08:00) : <strong>${escapeHtml(shiftData.shift1 || '-')}</strong></div>
                <div class="shift-item">🕗 Shift 2 (08:00 - 16:00) : <strong>${escapeHtml(shiftData.shift2 || '-')}</strong></div>
                <div class="shift-item">🕓 Shift 3 (16:00 - 00:00) : <strong>${escapeHtml(shiftData.shift3 || '-')}</strong></div>
            </div>
        `;
    }

    function closeManagePanel() {
        const dynamicDiv = document.getElementById('dynamicContent');
        if (dynamicDiv) {
            dynamicDiv.style.display = 'none';
            dynamicDiv.innerHTML = '';
        }
        isManagePanelOpen = false;
    }

    async function renderManageShiftPanel(containerElement) {
        if (!containerElement) return;
        const daysCount = getDaysInMonth(currentYear, currentMonth);
        const existing = currentShiftData || {};
        
        let html = `
            <div style="margin-bottom:20px;">
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; align-items: center;">
                    <h3 style="font-size: 1.3rem; color:#0b2b40; margin:0;"><i class="fas fa-calendar-edit"></i> Edit Jadwal Shift - ${currentYear}/${String(currentMonth).padStart(2,'0')}</h3>
                    <button id="closeManagePanel" class="btn-outline" style="padding:8px 20px;"><i class="fas fa-times"></i> Tutup</button>
                </div>
                <div class="info-message" style="margin-top: 16px;"><i class="fas fa-info-circle"></i> Isi nama petugas untuk setiap shift. Semua tanggal bisa diisi. Kosong akan ditampilkan sebagai "-". Perubahan langsung tersimpan ke Firebase dan tersinkron otomatis.</div>
            </div>
            <div class="shift-table-container">
                <table class="shift-table">
                    <thead><tr><th>Tanggal</th><th>Hari</th><th>Shift 1 (00-08)</th><th>Shift 2 (08-16)</th><th>Shift 3 (16-00)</th></tr></thead>
                    <tbody>
        `;
        for (let d = 1; d <= daysCount; d++) {
            const dateKey = formatDateStr(currentYear, currentMonth, d);
            const shift = existing[dateKey] || { shift1: '', shift2: '', shift3: '' };
            const dayName = getDayName(currentYear, currentMonth, d);
            html += `
                <tr>
                    <td><strong>${dateKey}</strong></td>
                    <td>${dayName}</td>
                    <td><input type="text" class="manage-shift-inp" data-date="${dateKey}" data-shift="shift1" value="${escapeHtml(shift.shift1)}" placeholder="Nama petugas" autocomplete="off"></td>
                    <td><input type="text" class="manage-shift-inp" data-date="${dateKey}" data-shift="shift2" value="${escapeHtml(shift.shift2)}" placeholder="Nama petugas" autocomplete="off"></td>
                    <td><input type="text" class="manage-shift-inp" data-date="${dateKey}" data-shift="shift3" value="${escapeHtml(shift.shift3)}" placeholder="Nama petugas" autocomplete="off"></td>
                </tr>
            `;
        }
        html += `</tbody></table></div><div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 24px;"><button id="btnUpdateSchedule" class="btn-save"><i class="fas fa-save"></i> 💾 Simpan Perubahan Jadwal</button><button id="btnCancelManage" class="btn-outline"><i class="fas fa-arrow-left"></i> Batal & Tutup</button></div>`;
        containerElement.innerHTML = html;
        
        const updateBtn = document.getElementById('btnUpdateSchedule');
        if (updateBtn) {
            updateBtn.addEventListener('click', async () => {
                const newData = {};
                let hasEmpty = false;
                const inputs = document.querySelectorAll('.manage-shift-inp');
                inputs.forEach(inp => {
                    const date = inp.getAttribute('data-date');
                    const shiftType = inp.getAttribute('data-shift');
                    if (!newData[date]) newData[date] = { shift1: '', shift2: '', shift3: '' };
                    newData[date][shiftType] = inp.value.trim();
                });
                for (let d = 1; d <= daysCount; d++) {
                    const dateKey = formatDateStr(currentYear, currentMonth, d);
                    const dayShift = newData[dateKey];
                    if (dayShift && (dayShift.shift1 === "" || dayShift.shift2 === "" || dayShift.shift3 === "")) {
                        hasEmpty = true;
                        break;
                    }
                }
                if (hasEmpty) {
                    if (!confirm("⚠️ Ada shift yang kosong pada beberapa tanggal. Data tetap bisa disimpan, namun shift kosong akan menampilkan '-' di menu utama. Lanjutkan?")) return;
                }
                const success = await syncShiftToFirebase(currentYear, currentMonth, newData);
                if (success) {
                    alert("✅ Jadwal shift berhasil diperbarui dan tersinkron ke Firebase (termasuk offline cache).");
                    await refreshShiftTodayDisplay();
                    closeManagePanel();
                } else {
                    alert("❌ Gagal menyimpan jadwal. Periksa koneksi atau konfigurasi Firebase.");
                }
            });
        }
        const cancelBtn = document.getElementById('btnCancelManage');
        if (cancelBtn) cancelBtn.addEventListener('click', () => closeManagePanel());
        const closeBtn = document.getElementById('closeManagePanel');
        if (closeBtn) closeBtn.addEventListener('click', () => closeManagePanel());
    }
    
    async function showManagePanel() {
        const dynamicDiv = document.getElementById('dynamicContent');
        if (dynamicDiv) {
            dynamicDiv.style.display = 'block';
            isManagePanelOpen = true;
            await renderManageShiftPanel(dynamicDiv);
            dynamicDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }
    
    // DAFTAR MODUL (ditambahkan Monitoring Kebersihan & Monitoring Grounding)
    const modulesList = [
        { name: "Monitoring Suhu", icon: "fas fa-temperature-high", file: "Monitoring Suhu.html", desc: "Suhu ruangan & watermark GPS" },
        { name: "Monitoring Pemancar", icon: "fas fa-broadcast-tower", file: "Monitoring Pemancar.html", desc: "Catat downtime ON/OFF" },
        { name: "Monitoring Kwh Meter", icon: "fas fa-charging-station", file: "Monitoring Kwh Meter.html", desc: "Pencatatan listrik & foto" },
        { name: "Monitoring Metering", icon: "fas fa-chart-line", file: "Monitoring Metering.html", desc: "PLN & UPS + spreadsheet" },
        { name: "Monitoring Siaran", icon: "fas fa-satellite-dish", file: "Monitoring Siaran.html", desc: "Status channel & laporan" },
        { name: "Monitoring Kerusakan", icon: "fas fa-tools", file: "Monitoring Kerusakan.html", desc: "Multi foto & status alat" },
        { name: "Monitoring BBM", icon: "fas fa-gas-pump", file: "Monitoring BBM.html", desc: "Genset & konsumsi BBM" },
        { name: "Monitoring Multiplexing", icon: "fas fa-network-wired", file: "Monitoring Multiplexing.html", desc: "Pantau 3 IRD, MUX, Kabel & IP + watermark" },
        // MODUL BARU: Monitoring Kebersihan
        { name: "Monitoring Kebersihan", icon: "fas fa-broom", file: "Monitoring Kebersihan.html", desc: "Pantau kebersihan area transmisi (genset, peralatan, pemancar, lingkungan)" },
        // MODUL BARU: Monitoring Grounding
        { name: "Monitoring Grounding", icon: "fas fa-bolt", file: "Monitoring Grounding.html", desc: "Pencatatan grounding 3 titik (Tower, Rak Perangkat, GIS/Trafo) + foto" }
    ];
    
    function renderModulesGrid() {
        const grid = document.getElementById('modulesGrid');
        if (!grid) return;
        grid.innerHTML = modulesList.map(mod => `
            <a href="${mod.file}" class="module-card" target="_self" rel="noopener noreferrer">
                <div class="module-icon"><i class="${mod.icon}"></i></div>
                <div class="module-info">
                    <h4>${mod.name}</h4>
                    <p>${mod.desc}</p>
                </div>
            </a>
        `).join('');
    }
    
    async function initMainMenu() {
        attachShiftListener(currentYear, currentMonth);
        renderModulesGrid();
        const manageBtn = document.getElementById('btnManageShift');
        if (manageBtn) {
            manageBtn.replaceWith(manageBtn.cloneNode(true));
            const newBtn = document.getElementById('btnManageShift');
            if (newBtn) newBtn.addEventListener('click', () => showManagePanel());
        } else {
            const btn = document.getElementById('btnManageShift');
            if (btn) btn.addEventListener('click', () => showManagePanel());
        }
    }
    
    function populateMonthYearSelectors() {
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        if (!monthSelect || !yearSelect) return;
        monthSelect.innerHTML = '';
        for (let i = 1; i <= 12; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = new Date(2000, i - 1, 1).toLocaleString('id', { month: 'long' });
            if (i === currentMonth) option.selected = true;
            monthSelect.appendChild(option);
        }
        const nowYear = new Date().getFullYear();
        yearSelect.innerHTML = '';
        for (let y = nowYear - 1; y <= nowYear + 3; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            if (y === currentYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }
        monthSelect.addEventListener('change', async (e) => {
            currentMonth = parseInt(e.target.value);
            await reloadBySelection();
        });
        yearSelect.addEventListener('change', async (e) => {
            currentYear = parseInt(e.target.value);
            await reloadBySelection();
        });
    }
    
    async function reloadBySelection() {
        closeManagePanel();
        attachShiftListener(currentYear, currentMonth);
        const statusBadge = document.getElementById('statusBadge');
        if (statusBadge) statusBadge.innerText = `📅 ${currentYear}-${String(currentMonth).padStart(2, '0')}`;
        refreshShiftTodayDisplay();
    }
    
    async function enableFirebasePersistence() {
        if (!window.db) return false;
        try {
            if (window.db.enablePersistence) {
                await window.db.enablePersistence();
                console.log("Firebase persistence diaktifkan");
            } else if (window.firebase && window.firebase.database) {
                await window.firebase.database().enablePersistence();
                console.log("Firebase persistence via root");
            } else {
                console.warn("enablePersistence tidak tersedia");
            }
            return true;
        } catch (err) {
            console.warn("Persistence error:", err);
            return false;
        }
    }

    function waitForFirebaseAndLoad() {
        if (window.db) {
            isFirebaseReady = true;
            enableFirebasePersistence().then(() => {
                updateFirebaseStatus(true, "Terhubung (Offline Ready)");
                initMainMenu();
            }).catch(() => {
                updateFirebaseStatus(true, "Terhubung");
                initMainMenu();
            });
        } else {
            setTimeout(waitForFirebaseAndLoad, 300);
        }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        populateMonthYearSelectors();
        const statusBadge = document.getElementById('statusBadge');
        if (statusBadge) statusBadge.innerText = `📅 ${currentYear}-${String(currentMonth).padStart(2, '0')}`;
        waitForFirebaseAndLoad();
    });
</script>
</body>
</html>
