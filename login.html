<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login - Portal Transmisi</title>
  <link rel="icon" type="image/ico" href="favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #eef2f8 0%, #e0f0ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      max-width: 420px;
      width: 100%;
      background: white;
      border-radius: 48px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      overflow: hidden;
      transition: all 0.2s;
    }
    .logo-area {
      background: linear-gradient(135deg, #1e6f5c 0%, #0e5a48 100%);
      padding: 32px 24px;
      text-align: center;
    }
    .logo-area img {
      max-height: 80px;
      max-width: 80%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }
    .logo-area h1 {
      color: white;
      margin-top: 12px;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .form-area {
      padding: 32px 28px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 60px;
      font-size: 1rem;
      font-family: inherit;
      transition: 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1e6f5c;
      box-shadow: 0 0 0 3px rgba(30,111,92,0.2);
    }
    .btn-login {
      width: 100%;
      background: #1e6f5c;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 12px;
    }
    .btn-login:hover { background: #0e5a48; transform: translateY(-2px); }
    .btn-guest {
      width: 100%;
      background: #f1f5f9;
      color: #1e293b;
      border: 1px solid #cbd5e1;
      padding: 14px;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-bottom: 20px;
    }
    .btn-guest:hover { background: #e6edf5; }
    .forgot-password {
      text-align: center;
      display: block;
      margin-top: 16px;
      color: #1e6f5c;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .forgot-password:hover { text-decoration: underline; }
    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      margin-bottom: 20px;
      text-align: center;
    }
    .info-msg {
      background: #e6f7f0;
      color: #1e6f5c;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      margin-bottom: 20px;
      text-align: center;
    }
    footer {
      text-align: center;
      padding: 16px;
      font-size: 0.7rem;
      color: #7f8c8d;
      border-top: 1px solid #e2edf2;
      background: #fafcff;
    }
    @media (max-width: 480px) {
      .form-area { padding: 24px 20px; }
      .logo-area { padding: 24px 16px; }
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="logo-area">
    <img src="Logo PortalTM-noBg.png" alt="Logo Portal Transmisi" onerror="this.style.display='none'">
    <h1>Portal Transmisi</h1>
    <p style="color: #e6f7f0; font-size: 0.8rem; margin-top: 5px;">Manajemen Shift & Monitoring</p>
  </div>
  <div class="form-area">
    <div id="messageBox"></div>
    <form id="loginForm">
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" required placeholder="contoh@email.com">
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" required placeholder="Masukkan password">
      </div>
      <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Masuk</button>
    </form>
    <button id="guestBtn" class="btn-guest"><i class="fas fa-user-friends"></i> Masuk sebagai Tamu</button>
    <a href="#" id="forgotPasswordLink" class="forgot-password"><i class="fas fa-question-circle"></i> Lupa Password?</a>
  </div>
  <footer>© Portal Transmisi - Tanah Merah</footer>
</div>

<script>
  const messageBox = document.getElementById('messageBox');
  function showMessage(msg, isError = true) {
    messageBox.innerHTML = `<div class="${isError ? 'error-msg' : 'info-msg'}">${msg}</div>`;
    setTimeout(() => { if(messageBox.innerHTML) messageBox.innerHTML = ''; }, 5000);
  }

  // Login form
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showMessage('Email dan password harus diisi');
    try {
      await window.auth.signInWithEmailAndPassword(email, password);
      // Redirect ke halaman utama
      window.location.href = 'index.html';
    } catch (err) {
      console.error(err);
      if (err.code === 'auth/user-not-found') showMessage('Email tidak terdaftar');
      else if (err.code === 'auth/wrong-password') showMessage('Password salah');
      else if (err.code === 'auth/invalid-email') showMessage('Format email tidak valid');
      else showMessage('Gagal login: ' + err.message);
    }
  });

  // Masuk sebagai tamu
  document.getElementById('guestBtn').addEventListener('click', () => {
    // Simpan status tamu di localStorage, lalu redirect
    localStorage.setItem('guestMode', 'true');
    window.location.href = 'index.html';
  });

  // Lupa password
  document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) {
      showMessage('Masukkan email Anda terlebih dahulu untuk reset password');
      return;
    }
    try {
      await window.auth.sendPasswordResetEmail(email);
      showMessage('📧 Email reset password telah dikirim. Cek inbox/spam.', false);
    } catch (err) {
      showMessage('Gagal kirim email reset: ' + err.message);
    }
  });

  // Jika sudah login, redirect ke index
  window.auth.onAuthStateChanged((user) => {
    if (user) window.location.href = 'index.html';
  });
</script>
</body>
</html>
