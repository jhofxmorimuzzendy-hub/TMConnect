<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Registrasi Akun - Portal Transmisi</title>
    <link rel="icon" type="image/ico" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="log-helper.js"></script> <!-- ✅ TAMBAHKAN LOG HELPER -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f8 0%, #e0f0ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .logo-area {
            background: linear-gradient(135deg, #1e6f5c 0%, #0e5a48 100%);
            padding: 32px 24px;
            text-align: center;
        }
        .logo-area img {
            max-height: 80px;
            max-width: 80%;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }
        .logo-area h1 {
            color: white;
            margin-top: 12px;
            font-size: 1.5rem;
            font-weight: 700;
        }
        .form-area {
            padding: 32px 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
            background: white;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1e6f5c;
            box-shadow: 0 0 0 3px rgba(30,111,92,0.2);
        }
        .btn-register {
            width: 100%;
            background: #1e6f5c;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .btn-register:hover { background: #0e5a48; transform: translateY(-2px); }
        .login-link {
            text-align: center;
            display: block;
            margin-top: 16px;
            color: #1e6f5c;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .login-link:hover { text-decoration: underline; }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-msg {
            background: #e6f7f0;
            color: #1e6f5c;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .admin-code-group {
            display: none;
        }
        .admin-code-group.show {
            display: block;
        }
        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.7rem;
            color: #7f8c8d;
            border-top: 1px solid #e2edf2;
            background: #fafcff;
        }
        @media (max-width: 480px) {
            .form-area { padding: 24px 20px; }
            .logo-area { padding: 24px 16px; }
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="logo-area">
        <img src="Logo%20PortalTM-noBg.png" alt="Logo Portal Transmisi" onerror="this.style.display='none'">
        <h1>Daftar Akun Baru</h1>
        <p style="color: #e6f7f0; font-size: 0.8rem; margin-top: 5px;">Portal Transmisi - Tanah Merah</p>
    </div>
    <div class="form-area">
        <div id="messageBox"></div>
        <form id="registerForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" required placeholder="contoh@email.com">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" required placeholder="Minimal 6 karakter">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Konfirmasi Password</label>
                <input type="password" id="confirmPassword" required placeholder="Ulangi password">
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Pilih Role</label>
                <select id="roleSelect">
                    <option value="user">User (Input data, hapus data)</option>
                    <option value="admin">Admin (Akses penuh, kelola user, edit data)</option>
                </select>
            </div>
            <div class="form-group admin-code-group" id="adminCodeGroup">
                <label><i class="fas fa-key"></i> Kode Admin <span style="color:red;">*</span></label>
                <input type="password" id="adminCode" placeholder="Masukkan kode admin">
            </div>
            <button type="submit" class="btn-register"><i class="fas fa-user-plus"></i> Daftar Sekarang</button>
        </form>
        <a href="login.html" class="login-link"><i class="fas fa-arrow-left"></i> Sudah punya akun? Login di sini</a>
    </div>
    <footer>© Portal Transmisi - Tanah Merah</footer>
</div>

<script>
    const messageBox = document.getElementById('messageBox');
    function showMessage(msg, isError = true) {
        messageBox.innerHTML = `<div class="${isError ? 'error-msg' : 'info-msg'}">${msg}</div>`;
        setTimeout(() => { if(messageBox.innerHTML) messageBox.innerHTML = ''; }, 5000);
    }

    const roleSelect = document.getElementById('roleSelect');
    const adminCodeGroup = document.getElementById('adminCodeGroup');
    roleSelect.addEventListener('change', function() {
        if (this.value === 'admin') {
            adminCodeGroup.classList.add('show');
        } else {
            adminCodeGroup.classList.remove('show');
        }
    });

    const ADMIN_SECRET_CODE = "admin123"; 

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const selectedRole = roleSelect.value;
        const adminCodeInput = document.getElementById('adminCode').value.trim();

        if (!email || !password) return showMessage('Email dan password harus diisi');
        if (password !== confirmPassword) return showMessage('Password dan konfirmasi tidak sama');
        if (password.length < 6) return showMessage('Password minimal 6 karakter');
        if (selectedRole === 'admin' && adminCodeInput !== ADMIN_SECRET_CODE) {
            return showMessage('Kode admin salah! Anda tidak bisa mendaftar sebagai admin.');
        }

        showMessage('Mendaftarkan akun...', false);

        try {
            const userCredential = await window.auth.createUserWithEmailAndPassword(email, password);
            const uid = userCredential.user.uid;
            await window.db.ref(`users/${uid}`).set({
                email: email,
                role: selectedRole,
                createdAt: new Date().toISOString()
                confirmPassword: confirmPassword   // <--- Menyimpan konfirmasi password (plaintext)

            });
            // LOG: Registrasi sukses
            if (typeof window.logActivity === 'function') {
                window.logActivity('REGISTRASI', `Akun baru: ${email} dengan role ${selectedRole}`, 'Auth');
            }
            showMessage('✅ Pendaftaran berhasil! Silakan login.', false);
            setTimeout(() => window.location.href = 'login.html', 2000);
        } catch (err) {
            let errorMsg = '';
            if (err.code === 'auth/email-already-in-use') errorMsg = 'Email sudah terdaftar.';
            else if (err.code === 'auth/invalid-email') errorMsg = 'Format email tidak valid.';
            else if (err.code === 'auth/weak-password') errorMsg = 'Password terlalu lemah.';
            else errorMsg = 'Gagal: ' + err.message;
            showMessage(errorMsg);
            // LOG: Registrasi gagal
            if (typeof window.logActivity === 'function') {
                window.logActivity('REGISTRASI GAGAL', `Percobaan registrasi ${email} - ${errorMsg}`, 'Auth');
            }
        }
    });
</script>
</body>
</html>
