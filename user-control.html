<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kontrol Pengguna - Admin Portal Transmisi</title>
    <link rel="icon" type="image/ico" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f8 0%, #e0f0ec 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e6f5c 0%, #0e5a48 100%);
            padding: 20px 28px;
            color: white;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.35); transform: translateY(-2px); }
        .content { padding: 28px 28px 36px; }
        .user-table-wrapper { overflow-x: auto; border-radius: 24px; border: 1px solid #e2e8f0; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 800px; }
        th { background: #eef2f5; padding: 14px 12px; text-align: left; border-bottom: 2px solid #cbd5e1; }
        td { padding: 14px 12px; border-bottom: 1px solid #e9edf2; vertical-align: middle; }
        .role-badge {
            display: inline-block;
            background: #e6f7f0;
            color: #1e6f5c;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .role-badge.admin { background: #fef3c7; color: #b45309; }
        select, button { font-family: inherit; }
        .select-role {
            padding: 6px 10px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: white;
            font-size: 0.8rem;
        }
        .btn-edit, .btn-delete, .btn-reset {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            transition: 0.2s;
            margin-right: 5px;
        }
        .btn-edit { background: #e6f7f0; color: #1e6f5c; }
        .btn-delete { background: #ffe6e5; color: #b91c1c; }
        .btn-reset { background: #eef2ff; color: #2563eb; }
        .btn-edit:hover, .btn-delete:hover, .btn-reset:hover { transform: translateY(-2px); filter: brightness(0.96); }
        .loading { text-align: center; padding: 40px; color: #5b6e8c; }
        .error-msg, .info-msg, .success-msg {
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            text-align: center;
        }
        .error-msg { background: #fee2e2; color: #b91c1c; }
        .info-msg { background: #e6f7f0; color: #1e6f5c; }
        .success-msg { background: #dcfce7; color: #15803d; }
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        .refresh-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            color: #7f8c8d;
            border-top: 1px solid #e2edf2;
            background: #fafcff;
        }
        @media (max-width: 640px) {
            .header { padding: 16px 20px; }
            .content { padding: 20px; }
            td, th { padding: 10px 8px; }
            .btn-edit, .btn-delete, .btn-reset { padding: 4px 8px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-users-cog"></i> Kontrol Pengguna</h1>
        <button id="backToDashboardBtn" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</button>
    </div>
    <div class="content">
        <div id="messageContainer"></div>
        <div class="action-bar">
            <span><i class="fas fa-database"></i> Manajemen role & kirim reset password</span>
            <button id="refreshUsersBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div id="usersListContainer">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Memuat daftar pengguna...</div>
        </div>
        <div class="info-msg" style="margin-top: 20px;">
            <i class="fas fa-info-circle"></i> <strong>Catatan:</strong> Hanya admin yang dapat mengubah role. Fitur "Reset Password" akan mengirim email ke pengguna untuk membuat password baru.
        </div>
    </div>
    <footer>Portal Transmisi - Manajemen User (Admin Only)</footer>
</div>

<script>
    let currentAdminUid = null;
    let authUnsubscribed = false;

    const messageDiv = document.getElementById('messageContainer');
    function showMessage(msg, type = 'error') {
        let className = 'error-msg';
        if (type === 'success') className = 'success-msg';
        if (type === 'info') className = 'info-msg';
        messageDiv.innerHTML = `<div class="${className}">${msg}</div>`;
        setTimeout(() => { if (messageDiv.innerHTML) messageDiv.innerHTML = ''; }, 4000);
    }

    async function getUserRole(uid) {
        if (!uid) return 'guest';
        try {
            const snapshot = await window.db.ref(`users/${uid}/role`).once('value');
            return snapshot.val() === 'admin' ? 'admin' : (snapshot.val() === 'user' ? 'user' : 'guest');
        } catch (err) {
            console.error("getUserRole error", err);
            return 'guest';
        }
    }

    async function loadAllUsers() {
        const snapshot = await window.db.ref('users').once('value');
        const data = snapshot.val();
        if (!data) return [];
        return Object.entries(data).map(([uid, info]) => ({
            uid, email: info.email || 'Tidak ada email', role: info.role || 'guest', createdAt: info.createdAt || '-'
        }));
    }

    async function updateUserRole(uid, newRole) {
        await window.db.ref(`users/${uid}/role`).set(newRole);
        return true;
    }

    async function deleteUserData(uid) {
        await window.db.ref(`users/${uid}`).remove();
        return true;
    }

    async function sendPasswordReset(email) {
        await window.auth.sendPasswordResetEmail(email);
        return { success: true, message: `Email reset password dikirim ke ${email}` };
    }

    function renderUsersTable(users, adminUid) {
        const container = document.getElementById('usersListContainer');
        if (!users.length) {
            container.innerHTML = `<div class="info-msg">Belum ada pengguna terdaftar.</div>`;
            return;
        }
        let html = `<div class="user-table-wrapper"><table><thead><tr><th>Email</th><th>Role</th><th>Ubah Role</th><th>Dibuat</th><th>Aksi</th></tr></thead><tbody>`;
        for (let user of users) {
            const isCurrent = user.uid === adminUid;
            const roleClass = user.role === 'admin' ? 'admin' : '';
            html += `<tr>
                <td>${escapeHtml(user.email)} ${isCurrent ? '<span class="role-badge">(Anda)</span>' : ''}</td>
                <td><span class="role-badge ${roleClass}">${user.role === 'admin' ? 'Admin' : (user.role === 'user' ? 'User' : 'Tamu')}</span></td>
                <td><select class="select-role" data-uid="${user.uid}" ${isCurrent ? 'disabled' : ''}>
                    <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                    <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                    <option value="guest" ${user.role === 'guest' ? 'selected' : ''}>Tamu</option>
                </select></td>
                <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString('id') : '-'}</td>
                <td>
                    <button class="btn-edit" data-uid="${user.uid}" ${isCurrent ? 'disabled' : ''}>Simpan Role</button>
                    <button class="btn-reset" data-email="${user.email}" ${isCurrent ? 'disabled' : ''}>Reset Password</button>
                    <button class="btn-delete" data-uid="${user.uid}" ${isCurrent ? 'disabled' : ''}>Hapus Data</button>
                </td>
            </tr>`;
        }
        html += `</tbody></table></div>`;
        container.innerHTML = html;

        // Pasang event
        document.querySelectorAll('.btn-edit').forEach(btn => {
            btn.onclick = async () => {
                const uid = btn.getAttribute('data-uid');
                const select = document.querySelector(`.select-role[data-uid="${uid}"]`);
                const newRole = select.value;
                if (confirm(`Ubah role menjadi ${newRole.toUpperCase()}?`)) {
                    await updateUserRole(uid, newRole);
                    showMessage(`Role berhasil diubah`, 'success');
                    refreshUserList();
                }
            };
        });
        document.querySelectorAll('.btn-reset').forEach(btn => {
            btn.onclick = async () => {
                const email = btn.getAttribute('data-email');
                if (confirm(`Kirim reset password ke ${email}?`)) {
                    try {
                        await sendPasswordReset(email);
                        showMessage(`Email reset terkirim ke ${email}`, 'success');
                    } catch (err) {
                        showMessage(`Gagal: ${err.message}`, 'error');
                    }
                }
            };
        });
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.onclick = async () => {
                const uid = btn.getAttribute('data-uid');
                if (confirm(`Hapus data user ini?`)) {
                    await deleteUserData(uid);
                    showMessage(`Data user dihapus`, 'success');
                    refreshUserList();
                }
            };
        });
    }

    async function refreshUserList() {
        try {
            const users = await loadAllUsers();
            renderUsersTable(users, currentAdminUid);
        } catch (err) {
            document.getElementById('usersListContainer').innerHTML = `<div class="error-msg">Gagal memuat data: ${err.message}</div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // Inisialisasi dengan auth state listener agar tidak redirect prematur
    function initAuthCheck() {
        if (!window.auth) {
            setTimeout(initAuthCheck, 300);
            return;
        }
        window.auth.onAuthStateChanged(async (user) => {
            if (authUnsubscribed) return;
            if (!user) {
                // Tidak login, arahkan ke login
                window.location.href = 'login.html';
                return;
            }
            const role = await getUserRole(user.uid);
            if (role !== 'admin') {
                showMessage('Halaman ini hanya untuk admin. Mengarahkan ke dashboard...', 'error');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }
            // Admin authenticated
            currentAdminUid = user.uid;
            await refreshUserList();
        });
    }

    document.getElementById('backToDashboardBtn').onclick = () => window.location.href = 'index.html';
    document.getElementById('refreshUsersBtn').onclick = () => refreshUserList();

    initAuthCheck();
</script>
</body>
</html>
