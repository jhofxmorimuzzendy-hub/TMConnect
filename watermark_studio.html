<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Watermark Studio - Auto Kirim ke Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'Inter', system-ui; background: radial-gradient(circle at 20% 30%, #070b17, #010208); min-height: 100vh; padding: 1rem; color: #f0f3fc; }
        .container { max-width: 1400px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; gap: 1rem; }
        h1 { font-size: 1.4rem; background: linear-gradient(135deg, #fff, #a5b4fc); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .toolbar { display: flex; gap: 0.5rem; background: #0f1222cc; backdrop-filter: blur(8px); padding: 0.4rem 0.8rem; border-radius: 2rem; flex-wrap: wrap; }
        .two-columns { display: grid; grid-template-columns: 1fr 1.5fr; gap: 1.2rem; margin-bottom: 1.2rem; }
        @media (max-width: 1000px) { .two-columns { grid-template-columns: 1fr; } }
        .glass-card { background: rgba(15, 20, 35, 0.75); backdrop-filter: blur(12px); border-radius: 1.5rem; border: 1px solid rgba(99, 102, 241, 0.4); overflow: hidden; }
        .card-header { padding: 0.7rem 1rem; background: #00000060; font-weight: 600; border-bottom: 1px solid #2d2f4a; }
        .preview-area { display: flex; justify-content: center; padding: 1rem; background: #00000040; min-height: 320px; }
        video { width: 100%; max-width: 450px; border-radius: 1rem; border: 1px solid #4f46e5; }
        canvas#mainCanvas { border-radius: 1rem; background: #f0f2f5; box-shadow: 0 8px 25px rgba(0,0,0,0.5); cursor: grab; border: 2px solid #6366f1; transform-origin: 0 0; transition: transform 0.05s linear; max-width: 100%; height: auto; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.7rem 1rem; }
        .btn { background: #1f253e; border: none; padding: 0.35rem 0.9rem; border-radius: 2rem; font-size: 0.7rem; cursor: pointer; color: white; display: inline-flex; align-items: center; gap: 5px; border: 1px solid #2d314a; }
        .btn-primary { background: #4f46e5; }
        .btn-success { background: #0f4c3a; }
        .btn-warning { background: #b45309; }
        .design-panel { background: rgba(10,13,24,0.96); border-radius: 1.5rem; padding: 1rem; margin-top: 0.8rem; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 0.8rem; align-items: center; }
        .elements-list { max-height: 130px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 5px; margin: 6px 0; }
        .elem-badge { background: #1e2440; border-radius: 2rem; padding: 0.2rem 0.6rem; font-size: 0.65rem; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
        .elem-badge.active { background: #4f46e5; }
        .shape-grid, .icon-grid { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
        .shape-item, .icon-option { font-size: 1.1rem; background: #1e243b; padding: 4px 12px; border-radius: 2rem; cursor: pointer; }
        .sent-photos-area { background: #0a0c18; border-radius: 1rem; padding: 0.5rem; margin-top: 0.5rem; max-height: 150px; overflow-y: auto; }
        .sent-thumb { display: inline-block; width: 50px; height: 50px; margin: 4px; border-radius: 8px; overflow: hidden; border: 1px solid #4f46e5; }
        .sent-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #1a1e2c; border-radius: 1.5rem; width: 90%; max-width: 800px; padding: 1rem; }
        #realMap { height: 400px; width: 100%; border-radius: 1rem; }
        .loading-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e6f5c; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 2000; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1>✍️ Watermark Studio - Auto Kirim ke Monitoring</h1>
        <div class="toolbar">
            <button id="refreshStampBtn" class="btn btn-warning">🔄 Refresh Stamp</button>
            <button id="savePresetBtn" class="btn btn-success">💾 Simpan Preset</button>
            <button id="loadPresetBtn" class="btn btn-primary">📂 Load Preset</button>
            <button id="undoBtn" class="btn">↩️ Undo</button>
            <button id="redoBtn" class="btn">↪️ Redo</button>
            <button id="zoomOutBtn" class="btn">🔍-</button>
            <span id="zoomLevel">100%</span>
            <button id="zoomInBtn" class="btn">🔍+</button>
        </div>
    </div>
    <div class="two-columns">
        <div class="glass-card">
            <div class="card-header">📸 Kamera & Watermark</div>
            <div class="preview-area"><video id="videoFeed" autoplay playsinline muted></video></div>
            <div class="btn-group">
                <button id="startCamBtn" class="btn btn-primary">🎥 Mulai Kamera</button>
                <button id="captureAndSendBtn" class="btn btn-success" disabled>📸 Ambil & Kirim Otomatis</button>
                <button id="stopCamBtn" class="btn btn-danger" disabled>⏹️ Matikan</button>
            </div>
            <div class="btn-group">
                <button id="addDateStampBtn" class="btn">Tanggal</button>
                <button id="addTimeStampBtn" class="btn">Jam</button>
                <button id="addDayStampBtn" class="btn">Hari</button>
                <button id="addCoordinatesBtn" class="btn">📍 Koordinat</button>
                <button id="addRealMapBtn" class="btn btn-primary">🗺️ Peta</button>
            </div>
            <div class="btn-group">
                <button id="addTextBtn" class="btn btn-primary">📝 Teks</button>
                <button id="addShapeBtn" class="btn btn-primary">🔷 Shape</button>
                <button id="addIconBtn" class="btn btn-primary">😀 Stiker</button>
                <button id="resetAllWatermarkBtn" class="btn btn-warning">🗑️ Reset Watermark</button>
            </div>
        </div>
        <div class="glass-card">
            <div class="card-header">✨ Canvas & Daftar Foto Terkirim</div>
            <div class="canvas-container" style="text-align:center"><canvas id="mainCanvas" width="700" height="500" style="max-width:100%; height:auto;"></canvas></div>
            <div class="sent-photos-area">
                <div style="font-size:0.7rem; margin-bottom:4px;">📤 Foto yang sudah dikirim ke Monitoring (sementara):</div>
                <div id="sentPhotosList" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
                <div id="sentCount" style="font-size:0.6rem; color:#a5b4fc; text-align:right;">0 foto dikirim</div>
            </div>
        </div>
    </div>
    <div class="design-panel">
        <div class="flex-row"><strong>🧩 Elemen</strong> <button id="deleteSelectedBtn" class="btn">Hapus</button> <button id="duplicateSelectedBtn" class="btn">Duplikasi</button></div>
        <div class="elements-list" id="elementsList"></div>
        <div id="propertyPanel" style="background:#00000050; border-radius:1rem; padding:0.5rem; margin-top:0.5rem;"><div id="propContent">Klik elemen untuk edit</div></div>
    </div>
</div>

<!-- Modal Peta -->
<div id="mapModal" class="modal"><div class="modal-content"><h3>🗺️ Pilih Lokasi</h3><input type="text" id="searchLocation" placeholder="Cari kota..."><div id="realMap"></div><button id="captureMapBtn" class="btn btn-primary">📸 Ambil Peta</button><button id="closeMapBtn" class="btn">Tutup</button></div></div>

<script>
    (function(){
        // ---------- DOM ----------
        const video = document.getElementById('videoFeed');
        const startCamBtn = document.getElementById('startCamBtn');
        const captureAndSendBtn = document.getElementById('captureAndSendBtn');
        const stopCamBtn = document.getElementById('stopCamBtn');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const elementsListDiv = document.getElementById('elementsList');
        const propContentDiv = document.getElementById('propContent');
        const refreshStampBtn = document.getElementById('refreshStampBtn');
        const savePresetBtn = document.getElementById('savePresetBtn');
        const loadPresetBtn = document.getElementById('loadPresetBtn');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
        const duplicateSelectedBtn = document.getElementById('duplicateSelectedBtn');
        const addTextBtn = document.getElementById('addTextBtn');
        const addShapeBtn = document.getElementById('addShapeBtn');
        const addIconBtn = document.getElementById('addIconBtn');
        const addDateStampBtn = document.getElementById('addDateStampBtn');
        const addTimeStampBtn = document.getElementById('addTimeStampBtn');
        const addDayStampBtn = document.getElementById('addDayStampBtn');
        const addCoordinatesBtn = document.getElementById('addCoordinatesBtn');
        const addRealMapBtn = document.getElementById('addRealMapBtn');
        const resetAllWatermarkBtn = document.getElementById('resetAllWatermarkBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const zoomLevelSpan = document.getElementById('zoomLevel');

        // State
        let elements = [];
        let nextId = 1;
        let selectedIds = new Set();
        let historyStack = [], historyIndex = -1;
        let backgroundImage = null;
        let backgroundColor = null;
        let hasPhoto = false;
        let mediaStream = null;
        let canvasZoom = 1;
        let sentPhotos = []; // hanya untuk UI sementara, tidak disimpan

        // Helper UI sent
        function updateSentPhotosUI(){
            const container = document.getElementById('sentPhotosList');
            const countSpan = document.getElementById('sentCount');
            container.innerHTML = '';
            sentPhotos.forEach((photo,idx)=>{
                const div = document.createElement('div');
                div.className = 'sent-thumb';
                div.innerHTML = `<img src="${photo.thumb}" title="Foto ${idx+1}">`;
                container.appendChild(div);
            });
            countSpan.innerText = `${sentPhotos.length} foto dikirim ke Monitoring`;
        }

        // Kirim ke Monitoring (opener)
        function sendToOpener(imageDataUrl){
            if(window.opener){
                window.opener.postMessage({ type: 'watermarkedFoto', data: imageDataUrl }, '*');
                // Tambahkan ke daftar sementara
                sentPhotos.push({ thumb: imageDataUrl, full: imageDataUrl });
                updateSentPhotosUI();
                showToast("✅ Foto terkirim ke Monitoring");
            } else {
                alert("Halaman ini tidak dibuka dari Monitoring Suhu. Kirim manual tidak bisa.");
            }
        }

        // Fungsi ambil foto dari kamera, ganti background, lalu kirim
        async function captureAndSend(){
            if(!mediaStream || !video.videoWidth){
                alert("Kamera belum aktif. Mulai kamera dulu.");
                return;
            }
            showToast("Mengambil foto...");
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            tempCanvas.getContext('2d').drawImage(video, 0, 0);
            const img = new Image();
            img.onload = () => {
                backgroundImage = img;
                backgroundColor = null;
                canvas.width = img.width;
                canvas.height = img.height;
                hasPhoto = true;
                redrawAll();
                saveHistory();
                // Kirim hasil canvas saat ini (dengan watermark)
                const finalImage = canvas.toDataURL('image/png');
                sendToOpener(finalImage);
                showToast("Foto dikirim! Anda bisa ambil foto lagi.");
            };
            img.src = tempCanvas.toDataURL('image/jpeg', 0.9);
        }

        // Fungsi menggambar (ringkas, sama seperti sebelumnya)
        function drawElement(el){ /* sama seperti versi sebelumnya, disederhanakan di sini */ 
            try{
                ctx.save();
                ctx.globalAlpha = el.opacity??1;
                if(el.type==='text'){
                    ctx.font = `${el.fontWeight||'normal'} ${el.fontStyle||'normal'} ${el.fontSize||28}px "${el.fontFamily||'Inter'}"`;
                    ctx.fillStyle = el.color||'#000';
                    ctx.fillText(el.text, el.x, el.y);
                } else if(el.type==='shape'){
                    ctx.fillStyle = el.fillColor||'#ffaa44';
                    ctx.fillRect(el.x, el.y, el.width||80, el.height||80);
                } else if(el.type==='icon'){
                    ctx.font = `${el.size||40}px "Segoe UI Emoji"`;
                    ctx.fillStyle = el.color||'#fff';
                    ctx.fillText(el.iconChar, el.x, el.y);
                } else if(el.type==='image' && el.imageElement){
                    ctx.drawImage(el.imageElement, el.x, el.y, el.width||200, el.height||150);
                }
                ctx.restore();
            }catch(e){}
        }
        function getElementBounds(el){
            if(el.type==='text') return {x:el.x, y:el.y, w:100, h:30};
            return {x:el.x, y:el.y, w:80, h:80};
        }
        function drawBackground(){
            if(backgroundImage && backgroundImage.complete) ctx.drawImage(backgroundImage,0,0,canvas.width,canvas.height);
            else if(backgroundColor){ ctx.fillStyle=backgroundColor; ctx.fillRect(0,0,canvas.width,canvas.height); }
            else { ctx.fillStyle='#f0f2f5'; ctx.fillRect(0,0,canvas.width,canvas.height); }
        }
        function redrawAll(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawBackground();
            for(let el of elements) drawElement(el);
        }
        function saveHistory(){ let clone=JSON.parse(JSON.stringify(elements)); historyStack=historyStack.slice(0,historyIndex+1); historyStack.push(clone); historyIndex=historyStack.length-1; }
        function undo(){ if(historyIndex>0){ historyIndex--; elements=JSON.parse(JSON.stringify(historyStack[historyIndex])); selectedIds.clear(); redrawAll(); updateUI(); } }
        function redo(){ if(historyIndex<historyStack.length-1){ historyIndex++; elements=JSON.parse(JSON.stringify(historyStack[historyIndex])); selectedIds.clear(); redrawAll(); updateUI(); } }
        function addElement(el){ el.id=nextId++; elements.push(el); selectedIds.clear(); selectedIds.add(el.id); saveHistory(); redrawAll(); updateUI(); }
        function deleteSelected(){ elements=elements.filter(el=>!selectedIds.has(el.id)); selectedIds.clear(); saveHistory(); redrawAll(); updateUI(); }
        function duplicateSelected(){ let newElems=[]; for(let id of selectedIds){ let orig=elements.find(e=>e.id===id); if(orig){ let copy=JSON.parse(JSON.stringify(orig)); copy.id=nextId++; copy.x+=20; copy.y+=20; newElems.push(copy); } } elements.push(...newElems); selectedIds.clear(); newElems.forEach(e=>selectedIds.add(e.id)); saveHistory(); redrawAll(); updateUI(); }
        function updateUI(){
            elementsListDiv.innerHTML = elements.map(el=>`<div class="elem-badge ${selectedIds.has(el.id)?'active':''}" data-id="${el.id}">${el.type} ${el.stampType?'🔁':''}<button class="delete-elem" data-id="${el.id}">✖</button></div>`).join('');
            document.querySelectorAll('.elem-badge').forEach(b=>{ b.addEventListener('click',(e)=>{ if(e.target.classList.contains('delete-elem'))return; let id=parseInt(b.dataset.id); if(e.ctrlKey){ if(selectedIds.has(id))selectedIds.delete(id); else selectedIds.add(id); }else{ selectedIds.clear(); selectedIds.add(id); } redrawAll(); }); const del=b.querySelector('.delete-elem'); if(del) del.addEventListener('click',(e)=>{ e.stopPropagation(); let id=parseInt(del.dataset.id); elements=elements.filter(e=>e.id!==id); selectedIds.delete(id); saveHistory(); redrawAll(); updateUI(); }); });
        }
        function resetAllWatermark(){ if(confirm("Hapus semua watermark?")){ elements=[]; selectedIds.clear(); nextId=1; saveHistory(); redrawAll(); updateUI(); } }

        // Stamp
        function getDateStr(){ const d=new Date(); return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`; }
        function getTimeStr(){ const d=new Date(); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; }
        function getDayStr(){ const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu']; return days[new Date().getDay()]; }
        async function getCoordinates(){ try{ const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej)); return `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`; }catch(e){ return "Tidak ada GPS"; } }
        function addDateStamp(){ addElement({type:'text', text:getDateStr(), x:20, y:canvas.height-70, fontSize:14, color:'#000', stampType:'date', isLive:true}); }
        function addTimeStamp(){ addElement({type:'text', text:getTimeStr(), x:20, y:canvas.height-50, fontSize:14, color:'#000', stampType:'time', isLive:true}); }
        function addDayStamp(){ addElement({type:'text', text:getDayStr(), x:20, y:canvas.height-90, fontSize:14, color:'#000', stampType:'day', isLive:true}); }
        async function addCoordinateStamp(){ const coord=await getCoordinates(); addElement({type:'text', text:coord, x:20, y:canvas.height-30, fontSize:14, color:'#000', stampType:'coordinate', isLive:true}); }
        async function refreshLiveStamps(){ for(let el of elements){ if(el.stampType && el.isLive){ if(el.stampType==='date') el.text=getDateStr(); else if(el.stampType==='time') el.text=getTimeStr(); else if(el.stampType==='day') el.text=getDayStr(); else if(el.stampType==='coordinate') el.text=await getCoordinates(); } } redrawAll(); saveHistory(); updateUI(); }

        // Kamera
        async function startCamera(){ if(mediaStream) stopCamera(); try{ const s=await navigator.mediaDevices.getUserMedia({video:true}); mediaStream=s; video.srcObject=s; await video.play(); captureAndSendBtn.disabled=false; startCamBtn.disabled=true; stopCamBtn.disabled=false; }catch(e){ alert("Gagal kamera"); } }
        function stopCamera(){ if(mediaStream) mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; video.srcObject=null; captureAndSendBtn.disabled=true; startCamBtn.disabled=false; stopCamBtn.disabled=true; }
        function showToast(msg){ let t=document.querySelector('.loading-toast'); if(!t){ t=document.createElement('div'); t.className='loading-toast'; document.body.appendChild(t); } t.innerText=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }

        // Peta sederhana (tidak perlu lokasi device rumit, biarkan user cari)
        const mapModal=document.getElementById('mapModal'), realMapDiv=document.getElementById('realMap');
        let mapInstance=null;
        function showMapModal(){ mapModal.style.display='flex'; setTimeout(()=>{ if(mapInstance) mapInstance.remove(); mapInstance=L.map(realMapDiv).setView([-6.2088,106.8456],13); L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mapInstance); },100); }
        function captureMap(){ html2canvas(realMapDiv,{scale:2}).then(c=>{ const imgData=c.toDataURL(); const img=new Image(); img.onload=()=>addElement({type:'image', imageElement:img, imageData:imgData, width:300, height:200, x:50, y:50}); img.src=imgData; mapModal.style.display='none'; }).catch(()=>alert("Gagal")); }
        document.getElementById('captureMapBtn').onclick=captureMap;
        document.getElementById('closeMapBtn').onclick=()=>{ mapModal.style.display='none'; if(mapInstance) mapInstance.remove(); };
        addRealMapBtn.onclick=showMapModal;

        // Preset JSON sederhana
        function exportJson(){ const data=JSON.stringify({elements,nextId}); const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([data],{type:'application/json'})); a.download='watermark.json'; a.click(); }
        function importJson(){ const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=e=>{ const file=e.target.files[0]; const reader=new FileReader(); reader.onload=ev=>{ const data=JSON.parse(ev.target.result); elements=data.elements; nextId=data.nextId; selectedIds.clear(); saveHistory(); redrawAll(); updateUI(); alert("Impor sukses"); }; reader.readAsText(file); }; inp.click(); }
        savePresetBtn.onclick=()=>localStorage.setItem('wm_preset',JSON.stringify({elements,nextId}));
        loadPresetBtn.onclick=()=>{ const raw=localStorage.getItem('wm_preset'); if(raw){ const d=JSON.parse(raw); elements=d.elements; nextId=d.nextId; selectedIds.clear(); redrawAll(); updateUI(); alert("Loaded"); } };
        
        // Zoom
        function updateZoom(){ canvas.style.transform=`scale(${canvasZoom})`; zoomLevelSpan.innerText=Math.round(canvasZoom*100)+'%'; }
        zoomInBtn.onclick=()=>{ canvasZoom=Math.min(2,canvasZoom+0.1); updateZoom(); };
        zoomOutBtn.onclick=()=>{ canvasZoom=Math.max(0.5,canvasZoom-0.1); updateZoom(); };

        // Event binding
        startCamBtn.onclick=startCamera;
        stopCamBtn.onclick=stopCamera;
        captureAndSendBtn.onclick=captureAndSend;
        undoBtn.onclick=undo;
        redoBtn.onclick=redo;
        deleteSelectedBtn.onclick=deleteSelected;
        duplicateSelectedBtn.onclick=duplicateSelected;
        addTextBtn.onclick=()=>addElement({type:'text', text:'Teks baru', x:100,y:100, fontSize:32, color:'#000'});
        addShapeBtn.onclick=()=>addElement({type:'shape', shapeType:'rectangle', x:150,y:150, width:80,height:80, fillColor:'#4f46e5'});
        addIconBtn.onclick=()=>addElement({type:'icon', iconChar:'😎', x:200,y:200, size:48, color:'#fff'});
        addDateStampBtn.onclick=addDateStamp;
        addTimeStampBtn.onclick=addTimeStamp;
        addDayStampBtn.onclick=addDayStamp;
        addCoordinatesBtn.onclick=addCoordinateStamp;
        refreshStampBtn.onclick=refreshLiveStamps;
        resetAllWatermarkBtn.onclick=resetAllWatermark;

        // Contoh awal
        addElement({type:'text', text:'Contoh Watermark', x:30, y:30, fontSize:24, color:'#4f46e5'});
        addDateStamp();
        addTimeStamp();
        redrawAll();
        updateUI();
    })();
</script>
</body>
</html>
